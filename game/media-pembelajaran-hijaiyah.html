<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar Huruf Hijaiyah - Anak TK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Rounded MT Bold', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: slideDown 0.8s ease-out;
        }

        .header h1 {
            color: white;
            font-size: 3em;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .header p {
            color: #fff;
            font-size: 1.3em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        /* Card Display - Huruf Besar */
        .main-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease-in;
        }

        .main-card::before {
            content: '⭐';
            position: absolute;
            font-size: 100px;
            opacity: 0.1;
            top: -20px;
            right: -20px;
            animation: rotate 10s linear infinite;
        }

        .huruf-display {
            font-size: 180px;
            color: #667eea;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 4px 4px 8px rgba(0,0,0,0.2);
            animation: pulse 2s ease-in-out infinite;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .huruf-display:hover {
            transform: scale(1.1);
        }

        .huruf-name {
            font-size: 2.5em;
            color: #764ba2;
            margin: 20px 0;
            font-weight: bold;
        }

        .huruf-latin {
            font-size: 1.8em;
            color: #666;
            background: #f0f4ff;
            padding: 10px 30px;
            border-radius: 20px;
            display: inline-block;
            margin: 10px 0;
        }

        /* Control Buttons */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .btn {
            padding: 20px 40px;
            font-size: 1.5em;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            font-family: 'Comic Sans MS', cursive;
        }

        .btn-prev {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-next {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-sound {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
            font-size: 1.8em;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(-2px) scale(1.02);
        }

        /* Grid Huruf Kecil */
        .huruf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .huruf-item {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            position: relative;
        }

        .huruf-item:hover {
            transform: translateY(-8px) rotate(2deg);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }

        .huruf-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: scale(1.1);
        }

        .huruf-arab {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .huruf-item.active .huruf-arab {
            color: white;
        }

        .huruf-label {
            font-size: 0.9em;
            color: #666;
        }

        .huruf-item.active .huruf-label {
            color: white;
        }

        /* Progress Bar */
        .progress-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .progress-label {
            text-align: center;
            color: #667eea;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #43e97b 0%, #38f9d7 100%);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        /* Mode Belajar */
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 15px 30px;
            background: white;
            border: 3px solid #667eea;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #764ba2;
        }

        .mode-btn:hover {
            transform: scale(1.05);
        }

        /* Quiz Mode */
        .quiz-container {
            background: white;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: none;
        }

        .quiz-container.active {
            display: block;
            animation: fadeIn 0.5s ease-in;
        }

        .quiz-question {
            font-size: 2em;
            color: #667eea;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .quiz-option {
            padding: 30px;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 20px;
            font-size: 3em;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .quiz-option:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .quiz-option.correct {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            animation: bounce 0.5s;
        }

        .quiz-option.wrong {
            background: linear-gradient(135deg, #f5576c 0%, #d53369 100%);
            animation: shake 0.5s;
        }

        .score-display {
            font-size: 1.5em;
            color: #764ba2;
            font-weight: bold;
            margin-top: 20px;
        }

        /* Floating Stars Animation */
        .star {
            position: fixed;
            color: #ffd700;
            font-size: 30px;
            animation: float 3s ease-in-out infinite;
            pointer-events: none;
            z-index: 1000;
        }

        /* Animations */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .huruf-display {
                font-size: 120px;
            }

            .huruf-name {
                font-size: 1.8em;
            }

            .btn {
                padding: 15px 25px;
                font-size: 1.2em;
            }

            .huruf-grid {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
                gap: 10px;
            }

            .huruf-arab {
                font-size: 2em;
            }
        }

        /* Konfetti Effect */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f0f;
            position: absolute;
            animation: confetti-fall 3s linear;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌙 Belajar Huruf Hijaiyah 🌙</h1>
            <p>Ayo Belajar dengan Menyenangkan! ✨</p>
        </div>

        <!-- Mode Selector -->
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="belajar">📚 Mode Belajar</button>
            <button class="mode-btn" data-mode="quiz">🎯 Mode Quiz</button>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-label">Progress Belajar: <span id="progressText">1/28</span></div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>
        </div>

        <!-- Belajar Mode -->
        <div id="belajarMode">
            <!-- Main Card -->
            <div class="main-card">
                <div class="huruf-display" id="hurufDisplay" onclick="playSound()">ا</div>
                <div class="huruf-name" id="hurufName">ALIF</div>
                <div class="huruf-latin" id="hurufLatin">A</div>
                
                <div class="controls">
                    <button class="btn btn-prev" onclick="prevHuruf()">⬅️ Sebelumnya</button>
                    <button class="btn btn-sound" onclick="playSound()">🔊 Dengar Suara</button>
                    <button class="btn btn-next" onclick="nextHuruf()">Selanjutnya ➡️</button>
                </div>
            </div>

            <!-- Grid Semua Huruf -->
            <div class="huruf-grid" id="hurufGrid"></div>
        </div>

        <!-- Quiz Mode -->
        <div class="quiz-container" id="quizMode">
            <div class="quiz-question" id="quizQuestion">Pilih huruf yang benar:</div>
            <div class="quiz-options" id="quizOptions"></div>
            <div class="score-display" id="scoreDisplay">Skor: 0</div>
            <button class="btn btn-next" onclick="nextQuiz()" style="margin-top: 20px;">Soal Berikutnya ➡️</button>
        </div>
    </div>

    <script>
        // Data Huruf Hijaiyah
        const hurufHijaiyah = [
            { arab: 'ا', nama: 'ALIF', latin: 'A', suara: 'alif' },
            { arab: 'ب', nama: 'BA', latin: 'B', suara: 'ba' },
            { arab: 'ت', nama: 'TA', latin: 'T', suara: 'ta' },
            { arab: 'ث', nama: 'TSA', latin: 'TS', suara: 'tsa' },
            { arab: 'ج', nama: 'JIM', latin: 'J', suara: 'jim' },
            { arab: 'ح', nama: 'HA', latin: 'H', suara: 'ha' },
            { arab: 'خ', nama: 'KHA', latin: 'KH', suara: 'kha' },
            { arab: 'د', nama: 'DAL', latin: 'D', suara: 'dal' },
            { arab: 'ذ', nama: 'DZAL', latin: 'DZ', suara: 'dzal' },
            { arab: 'ر', nama: 'RA', latin: 'R', suara: 'ra' },
            { arab: 'ز', nama: 'ZA', latin: 'Z', suara: 'za' },
            { arab: 'س', nama: 'SIN', latin: 'S', suara: 'sin' },
            { arab: 'ش', nama: 'SYIN', latin: 'SY', suara: 'syin' },
            { arab: 'ص', nama: 'SHAD', latin: 'SH', suara: 'shad' },
            { arab: 'ض', nama: 'DHAD', latin: 'DH', suara: 'dhad' },
            { arab: 'ط', nama: 'THA', latin: 'TH', suara: 'tha' },
            { arab: 'ظ', nama: 'ZHA', latin: 'ZH', suara: 'zha' },
            { arab: 'ع', nama: 'AIN', latin: 'Ꞌ', suara: 'ain' },
            { arab: 'غ', nama: 'GHAIN', latin: 'GH', suara: 'ghain' },
            { arab: 'ف', nama: 'FA', latin: 'F', suara: 'fa' },
            { arab: 'ق', nama: 'QAF', latin: 'Q', suara: 'qaf' },
            { arab: 'ك', nama: 'KAF', latin: 'K', suara: 'kaf' },
            { arab: 'ل', nama: 'LAM', latin: 'L', suara: 'lam' },
            { arab: 'م', nama: 'MIM', latin: 'M', suara: 'mim' },
            { arab: 'ن', nama: 'NUN', latin: 'N', suara: 'nun' },
            { arab: 'و', nama: 'WAU', latin: 'W', suara: 'wau' },
            { arab: 'ه', nama: 'HA', latin: 'H', suara: 'ha2' },
            { arab: 'ي', nama: 'YA', latin: 'Y', suara: 'ya' }
        ];

        let currentIndex = 0;
        let quizScore = 0;
        let currentQuizIndex = 0;
        let visitedHuruf = new Set([0]);

        // Initialize
        function init() {
            renderHurufGrid();
            updateDisplay();
            updateProgress();
        }

        // Render Grid
        function renderHurufGrid() {
            const grid = document.getElementById('hurufGrid');
            grid.innerHTML = hurufHijaiyah.map((huruf, index) => `
                <div class="huruf-item ${index === 0 ? 'active' : ''}" onclick="selectHuruf(${index})">
                    <div class="huruf-arab">${huruf.arab}</div>
                    <div class="huruf-label">${huruf.nama}</div>
                </div>
            `).join('');
        }

        // Update Display
        function updateDisplay() {
            const huruf = hurufHijaiyah[currentIndex];
            document.getElementById('hurufDisplay').textContent = huruf.arab;
            document.getElementById('hurufName').textContent = huruf.nama;
            document.getElementById('hurufLatin').textContent = huruf.latin;

            // Update active state
            const items = document.querySelectorAll('.huruf-item');
            items.forEach((item, index) => {
                item.classList.toggle('active', index === currentIndex);
            });

            visitedHuruf.add(currentIndex);
            updateProgress();
            createStars();
        }

        // Update Progress
        function updateProgress() {
            const progress = (visitedHuruf.size / hurufHijaiyah.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressFill').textContent = Math.round(progress) + '%';
            document.getElementById('progressText').textContent = `${visitedHuruf.size}/${hurufHijaiyah.length}`;
        }

        // Navigation
        function nextHuruf() {
            currentIndex = (currentIndex + 1) % hurufHijaiyah.length;
            updateDisplay();
            playSound();
        }

        function prevHuruf() {
            currentIndex = (currentIndex - 1 + hurufHijaiyah.length) % hurufHijaiyah.length;
            updateDisplay();
            playSound();
        }

        function selectHuruf(index) {
            currentIndex = index;
            updateDisplay();
            playSound();
        }

        // Play Sound menggunakan Web Speech API
        function playSound() {
            const huruf = hurufHijaiyah[currentIndex];
            const utterance = new SpeechSynthesisUtterance(huruf.nama);
            utterance.lang = 'id-ID';
            utterance.rate = 0.8;
            utterance.pitch = 1.2;
            speechSynthesis.speak(utterance);
            
            // Alternative: speak the Arabic letter
            setTimeout(() => {
                const arabUtterance = new SpeechSynthesisUtterance(huruf.arab);
                arabUtterance.lang = 'ar-SA';
                arabUtterance.rate = 0.7;
                speechSynthesis.speak(arabUtterance);
            }, 800);
        }

        // Mode Switching
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const mode = this.dataset.mode;
                if (mode === 'quiz') {
                    document.getElementById('belajarMode').style.display = 'none';
                    document.getElementById('quizMode').classList.add('active');
                    generateQuiz();
                } else {
                    document.getElementById('belajarMode').style.display = 'block';
                    document.getElementById('quizMode').classList.remove('active');
                }
            });
        });

        // Quiz Functions
        function generateQuiz() {
            currentQuizIndex = Math.floor(Math.random() * hurufHijaiyah.length);
            const correctHuruf = hurufHijaiyah[currentQuizIndex];
            
            document.getElementById('quizQuestion').textContent = `Pilih huruf: ${correctHuruf.nama}`;
            
            // Generate 4 random options including correct one
            let options = [correctHuruf];
            while (options.length < 4) {
                const randomHuruf = hurufHijaiyah[Math.floor(Math.random() * hurufHijaiyah.length)];
                if (!options.includes(randomHuruf)) {
                    options.push(randomHuruf);
                }
            }
            
            // Shuffle options
            options.sort(() => Math.random() - 0.5);
            
            // Render options
            const optionsContainer = document.getElementById('quizOptions');
            optionsContainer.innerHTML = options.map(huruf => `
                <div class="quiz-option" onclick="checkAnswer('${huruf.arab}', '${correctHuruf.arab}', this)">
                    ${huruf.arab}
                </div>
            `).join('');
        }

        function checkAnswer(selected, correct, element) {
            const allOptions = document.querySelectorAll('.quiz-option');
            allOptions.forEach(opt => opt.style.pointerEvents = 'none');
            
            if (selected === correct) {
                element.classList.add('correct');
                quizScore++;
                createConfetti();
                playSuccessSound();
            } else {
                element.classList.add('wrong');
                // Highlight correct answer
                allOptions.forEach(opt => {
                    if (opt.textContent.trim() === correct) {
                        opt.classList.add('correct');
                    }
                });
            }
            
            document.getElementById('scoreDisplay').textContent = `Skor: ${quizScore}`;
        }

        function nextQuiz() {
            const allOptions = document.querySelectorAll('.quiz-option');
            allOptions.forEach(opt => {
                opt.classList.remove('correct', 'wrong');
                opt.style.pointerEvents = 'auto';
            });
            generateQuiz();
        }

        // Visual Effects
        function createStars() {
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.textContent = '⭐';
                    star.style.left = Math.random() * window.innerWidth + 'px';
                    star.style.top = Math.random() * 200 + 'px';
                    document.body.appendChild(star);
                    
                    setTimeout(() => star.remove(), 3000);
                }, i * 200);
            }
        }

        function createConfetti() {
            const colors = ['#f0f', '#0ff', '#ff0', '#0f0', '#f00'];
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * window.innerWidth + 'px';
                    confetti.style.top = '-10px';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 3000);
                }, i * 50);
            }
        }

        function playSuccessSound() {
            const utterance = new SpeechSynthesisUtterance('Benar! Hebat sekali!');
            utterance.lang = 'id-ID';
            utterance.rate = 1.1;
            utterance.pitch = 1.3;
            speechSynthesis.speak(utterance);
        }

        // Keyboard Navigation
        document.addEventListener('keydown', function(e) {
            if (document.getElementById('belajarMode').style.display !== 'none') {
                if (e.key === 'ArrowRight') nextHuruf();
                if (e.key === 'ArrowLeft') prevHuruf();
                if (e.key === ' ') {
                    e.preventDefault();
                    playSound();
                }
            }
        });

        // Initialize on load
        init();
    </script>
</body>
</html>
